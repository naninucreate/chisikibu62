<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セキュリティ確認</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BDGN44J2DC"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-BDGN44J2DC');
</script>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>
// ★すでに認証済みならスキップ
if(sessionStorage.getItem("auth") === "ok"){
  location.href = "page.html";
}
</script>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  color:#fff;
  font-family:sans-serif;
}

.box{
  background:#1e293b;
  padding:40px;
  border-radius:12px;
  text-align:center;
}
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>セキュリティ確認</h2>
  <p>チェックしてから続行</p>

  <!-- ★サイトキー -->
  <div class="g-recaptcha" data-sitekey="6LckkJAsAAAAALLaRuivOB9n1airWhfHGCI3LbW1"></div>

  <br>
  <button onclick="go()">続行</button>
</div>

<script>
function go(){
  const token = grecaptcha.getResponse();

  if(!token){
    alert("チェックしてね");
    return;
  }

  // 認証成功
  sessionStorage.setItem("auth","ok");

  // トークンリセット（超重要）
  grecaptcha.reset();

  location.href = "page.html";
}

// ページ戻ったとき用リセット
window.onload = function(){
  if(typeof grecaptcha !== "undefined"){
    grecaptcha.reset();
  }
}
</script>

</body>
</html>
